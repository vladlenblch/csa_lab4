  22 - 2200000001 - PUSHI32 1
  27 - 06 - STORE
  28 - 19 - IRET
  29 - 17 - EI
  30 - 2200000001 - PUSHI32 1
  35 - 05 - LOAD
  36 - 2200000003 - PUSHI32 3
  41 - 0C - EQ
  42 - 20FFF1 - JZ -15
  45 - 12 - RET
out_data: !!binary |
  AAAAAAAAAAA=
out_data_hex: |-
  0 - 00000000 - 0
  1 - 00000000 - 0
out_interrupts: |
  on-input 4
out_stdout: |
  ABC
  ticks: 111
