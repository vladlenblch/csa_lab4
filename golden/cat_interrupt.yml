in_source: |-
  variable count
  
  :interrupt on-input
      read-char write-char
      count load 1 + count store
  ;
  
  : main
      ei
      begin
          count load 3 =
      until
  ;
in_stdin: |-
  1 A
  30 B
  60 C
in_limit: 10000
out_code: !!binary |
  HQAaABj/ABn/Ah4AAAABBR4AAAABBx4AAAABBhYUHgAAAAEFHgAAAAMMHP/xDw==
out_code_hex: |-
  0 - 1D001A - CALL 26
  3 - 00 - HALT
  4 - 18FF00 - LOADA 0xFF00
  7 - 19FF02 - STOREA 0xFF02
  10 - 1E00000001 - PUSHI32 1
  15 - 05 - LOAD
  16 - 1E00000001 - PUSHI32 1
  21 - 07 - ADD
  22 - 1E00000001 - PUSHI32 1
  27 - 06 - STORE
  28 - 16 - IRET
  29 - 14 - EI
  30 - 1E00000001 - PUSHI32 1
  35 - 05 - LOAD
  36 - 1E00000003 - PUSHI32 3
  41 - 0C - EQ
  42 - 1CFFF1 - JZ -15
  45 - 0F - RET
out_data: !!binary |
  AAAAAAAAAAA=
out_data_hex: |-
  0 - 00000000 - 0
  1 - 00000000 - 0
out_interrupts: |
  on-input 4
out_stdout: |
  ABC
  ticks: 105
