in_source: |-
  variable count
  
  :interrupt on-input
      read-char write-char
      count load 1 + count store
  ;
  
  : main
      ei
      begin
          count load 3 =
      until
  ;
in_stdin: |-
  1 A
  30 B
  60 C
in_limit: 10000
out_code: !!binary |
  IQAaABv/ABz/AiIAAAABBSIAAAABByIAAAABBhkXIgAAAAEFIgAAAAMMIP/xEg==
out_code_hex: |-
  0 - 21001A - CALL 26
  3 - 00 - HALT
  4 - 1BFF00 - LOADA 0xFF00
  7 - 1CFF02 - STOREA 0xFF02
  10 - 2200000001 - PUSHI32 1
  15 - 05 - LOAD
  16 - 2200000001 - PUSHI32 1
