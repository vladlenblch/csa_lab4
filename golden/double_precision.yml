in_source: |-
  variable a-hi
  variable a-lo
  variable b-hi
  variable b-lo
  variable carry
  variable sum-hi
  variable sum-lo
  
  : add64
      a-lo load b-lo load + get-carry carry store sum-lo store
      a-hi load b-hi load + carry load + sum-hi store
  ;
  
  : main
      2 a-hi store
      3912345678 a-lo store
      5 b-hi store
      382621625 b-lo store
      add64
      sum-hi load 48 + write-char
      58 write-char
      sum-lo load 48 + write-char
  ;
