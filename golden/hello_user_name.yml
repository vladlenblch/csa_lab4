in_source: |-
  variable name-base
  variable done
  variable ch

  : type-pstr
      dup load swap 1 +
      swap 0 do
          dup i + load write-char
      loop
      drop
  ;

  : print-prompt
      s"What is your name?" type-pstr
  ;

  : print-greeting
      s"Hello, " type-pstr
  ;

  :interrupt on-input
      read-char ch store
      ch load 10 =
      if
          1 done store
      else
          ch load name-base load dup load 1 + + store
          name-base load dup load 1 + swap store
      then
  ;

  : main
      print-prompt
      s"" name-base store
      ei
      begin
          done load
      until
      print-greeting
      name-base load type-pstr
      33 write-char
  ;
