  3 - 00 - HALT
  4 - 1E00000004 - PUSHI32 4
  9 - 1E00000001 - PUSHI32 1
  14 - 06 - STORE
  15 - 1E00000005 - PUSHI32 5
  20 - 1A0001 - ADDM 0x0001
  23 - 1E00000030 - PUSHI32 48
  28 - 07 - ADD
  29 - 19FF02 - STOREA 0xFF02
  32 - 0F - RET
out_data: !!binary |
  AAAAAAAAAAA=
out_data_hex: |-
  0 - 00000000 - 0
  1 - 00000000 - 0
out_interrupts: |
out_stdout: |
  9
  ticks: 31
