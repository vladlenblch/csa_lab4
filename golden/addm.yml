in_source: |-
  variable factor
  
  : main
      4 factor store
      5 addm factor
      48 + write-char
  ;
  
in_stdin: |-
in_limit: 10000
out_code: !!binary |
  HQABAB4AAAAEHgAAAAEGHgAAAAUaAAEeAAAAMAcZ/wIP
out_code_hex: |-
